apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: product-catalog-role
  namespace: iapteca
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: product-catalog-rolebinding
  namespace: iapteca
subjects:
- kind: ServiceAccount
  name: product-catalog-sa
  namespace: iapteca
roleRef:
  kind: Role
  name: product-catalog-role
  apiGroup: rbac.authorization.k8s.io
---
