apiVersion: v1
kind: Secret
metadata:
  name: order-processing-secret
  namespace: iapteca
type: Opaque
stringData:
  MONGODB_URI: "mongodb://order-processing-user:order-pass@mongodb:27017/iapteca?replicaSet=rs0&directConnection=true&authSource=admin"
  DB_USER: order-processing-user
  DB_PASSWORD: order-pass
  DB_WRITE_ENABLED: "true"
