apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: iapteca
data:
  NODE_ENV: "production"
  SERVICE_NAME: "api-gateway"
  GATEWAY_PORT: "8000"
  PRODUCT_CATALOG_URL: "http://product-catalog:3001"
  ORDER_PROCESSING_URL: "http://order-processing:3002"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  REQUEST_TIMEOUT_MS: "30000"
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    
    events {
      worker_connections 1024;
    }
    
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      
      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
      
      access_log /var/log/nginx/access.log main;
      
      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      
      upstream product_catalog {
        server product-catalog:3001;
      }
      
      upstream order_processing {
        server order-processing:3002;
      }
      
      server {
        listen 8000;
        server_name _;
        
        location /api/products {
          proxy_pass http://product_catalog;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /api/orders {
          proxy_pass http://order_processing;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }
      }
    }
