# ============================================================
# ✅ CI/CD пайплайн — пройшов аудит безпеки
# ============================================================

name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# FIX: блок env із hardcoded секретами повністю видалений.
# Загроза: будь-хто з read-доступом до репо міг прочитати токен
# та отримати повний доступ до DockerHub-акаунта.
# Тепер credentials передаються напряму через GitHub Actions Secrets.

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          # FIX: username береться з GitHub Secrets замість hardcoded значення.
          # Загроза: витік імені користувача спрощує цільові атаки на акаунт.
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # FIX: токен береться з GitHub Secrets замість plaintext у YAML.
          # Загроза: hardcoded токен — це пряма компрометація облікових даних;
          # будь-хто з доступом до репо (або його форку) міг використати токен
          # для пушу шкідливих образів у DockerHub.
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          # FIX: тег :latest замінено на хеш коміту (${{ github.sha }}).
          # Загроза: тег :latest — мутабельний; він перезаписується при кожному
          # білді, що унеможливлює відкат до конкретної версії, створює ризик
          # підміни образу (tag mutation attack) та порушує відтворюваність
          # деплоїв у різних середовищах.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iapteca:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
