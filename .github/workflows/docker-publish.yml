# ============================================================
# ⚠️  УВАГА: Цей пайплайн НАВМИСНО містить дві вразливості
#     для навчальних/тестових цілей.
#
#   1. HARDCODED SECRET — DockerHub токен вшитий прямо у файл
#   2. НЕБЕЗПЕЧНЕ ВЕРСІОНУВАННЯ — образ пушиться лише з :latest
#
#   🚫 НЕ ВИКОРИСТОВУЙТЕ цей файл у production!
# ============================================================

name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # ╔══════════════════════════════════════════════════════════╗
  # ║  🔴 ВРАЗЛИВІСТЬ #1: HARDCODED SECRET                   ║
  # ║  Токен DockerHub вшитий прямо у YAML-файл.              ║
  # ║  Будь-хто з доступом до репозиторію може його побачити.  ║
  # ║                                                          ║
  # ║  ✅ ПРАВИЛЬНО: використовувати GitHub Secrets            ║
  # ║     ${{ secrets.DOCKERHUB_TOKEN }}                       ║
  # ╚══════════════════════════════════════════════════════════╝
  DOCKERHUB_USERNAME: bouncytorch
  DOCKERHUB_TOKEN: dckr_pat_abc123_FAKE_TOKEN_FOR_TESTING_xyz789

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ╔══════════════════════════════════════════════════════════╗
      # ║  🔴 ВРАЗЛИВІСТЬ #2: НЕБЕЗПЕЧНЕ ВЕРСІОНУВАННЯ           ║
      # ║  Образ пушиться ТІЛЬКИ з тегом :latest.                 ║
      # ║  Неможливо відкотитись до конкретної версії.             ║
      # ║  Різні середовища можуть отримати різні образи.         ║
      # ║                                                          ║
      # ║  ✅ ПРАВИЛЬНО: використовувати хеш коміту як тег        ║
      # ║     tags: bouncytorch/iapteca:${{ github.sha }}         ║
      # ╚══════════════════════════════════════════════════════════╝
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: bouncytorch/iapteca:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
