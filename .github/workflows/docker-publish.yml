# ============================================================
#   CI/CD пайплайн для збірки та публікації Docker-образу
#   Секрети винесено у GitHub Actions Secrets
#   Образи тегуються хешем коміту для відтворюваності
# ============================================================

name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          # FIX: Усунено hardcoded username — витік облікових даних дозволяє
          # зловмиснику пушити шкідливі образи під іменем власника акаунту.
          # Тепер значення береться з GitHub Actions Secrets (Settings → Secrets).
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # FIX: Усунено hardcoded PAT-токен (dckr_pat_...) — будь-хто з доступом
          # до репозиторію міг прочитати токен і отримати повний доступ до DockerHub.
          # Тепер токен зберігається у зашифрованому сховищі GitHub Secrets.
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          # FIX: Замінено тег :latest на хеш коміту (${{ github.sha }}).
          # Загроза :latest — мутабельний тег перезаписується при кожному білді,
          # що унеможливлює відкат до конкретної версії та порушує детермінованість
          # деплою (різні середовища можуть отримати різні образи з однаковим тегом).
          # Хеш коміту гарантує іммутабельність та однозначну ідентифікацію білду.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iapteca:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

